<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Core Team Builder</title>
  <link rel="stylesheet" href="css/styles.css?v=76" />
</head>
<body>
  <main class="center-screen">
    <div class="card card--narrow">
      <div class="text-center mt-4">
        <div class="brand">
          Core Team Builder
          <small>Elder Scrolls Online · Trial Roster</small>
        </div>
      </div>

      <h2 class="text-center mt-6">Reset your password</h2>

      <div id="message" class="message is-hidden"></div>

      <!-- New-password form: shown when a token is present in the URL. -->
      <form id="reset-form" class="mt-4">
        <div class="form-group">
          <label for="reset-password">New password</label>
          <input class="input" id="reset-password" name="password" type="password" autocomplete="new-password" minlength="8" required />
          <small class="text-muted">At least 8 characters.</small>
        </div>
        <div class="form-group">
          <label for="reset-password-confirm">Confirm new password</label>
          <input class="input" id="reset-password-confirm" name="password-confirm" type="password" autocomplete="new-password" minlength="8" required />
        </div>
        <button class="btn btn--primary btn--block" type="submit">Set new password</button>
      </form>

      <p class="text-center mt-4">
        <a class="link-btn" href="login.html">← Back to sign in</a>
      </p>
    </div>
  </main>

  <script src="js/api.js?v=76"></script>
  <script src="js/reset.js?v=76"></script>
</body>
</html>
