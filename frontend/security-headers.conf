# Browser security headers, delivered on every response that includes this
# snippet. Kept in one file because nginx's `add_header` does NOT inherit into a
# location that defines its own `add_header` — so any context that sets headers
# (e.g. Cache-Control) must `include` this to avoid silently dropping them.
#
# `always` ensures the headers are emitted on error responses too.
#
# TLS/HSTS are intentionally NOT here: this instance serves plain HTTP on the
# internal network; the upstream TLS-terminating proxy owns the redirect and the
# Strict-Transport-Security header (a browser ignores HSTS sent over HTTP).

# Content-Security-Policy shrinks the XSS blast radius. The app has no inline
# <script> and no third-party origins, so script/connect stay 'self'. index.html
# uses inline style="" attributes, so style-src needs 'unsafe-inline' (low risk
# for styles, unlike scripts). Tighten to "style-src 'self'" if those inline
# styles are ever moved into css/styles.css.
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'none'; form-action 'self'; object-src 'none'" always;

# Defense-in-depth against clickjacking (CSP frame-ancestors is the modern form).
add_header X-Frame-Options "DENY" always;

# Stop browsers from MIME-sniffing responses into an unexpected content type.
add_header X-Content-Type-Options "nosniff" always;

# Don't leak referrer URLs to other origins.
add_header Referrer-Policy "no-referrer" always;

# Disable browser features the app doesn't use.
add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
