# nginx serves the static frontend and reverse-proxies API calls to the Go
# backend. Keeping the API same-origin (under /api/) avoids browser CORS.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index login.html index.html;

    # HTML is always revalidated so updated asset version strings (e.g.
    # styles.css?v=N) are picked up immediately after a deploy.
    location ~* \.html$ {
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    # Versioned JS/CSS may be cached; the ?v= query string busts stale copies.
    location ~* \.(?:js|css)$ {
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    # Static assets / SPA fallback.
    location / {
        try_files $uri $uri/ =404;
    }

    # Proxy API requests to the backend service (named "backend" on the
    # docker-compose network).
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
