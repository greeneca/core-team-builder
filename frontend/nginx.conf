# nginx serves the static frontend and reverse-proxies API calls to the Go
# backend. Keeping the API same-origin (under /api/) avoids browser CORS.

# Rate-limit zones keyed by client IP. Auth endpoints are brute-force targets so
# they get a tight budget; the general API gets a looser one. Both rely on the
# real client IP, so ensure the upstream TLS proxy forwards it (see note below).
#   auth   : login/register/refresh — 5 req/min sustained, small burst.
#   share  : team share-by-username — 10 req/min; throttles username enumeration
#            via this authenticated oracle (M3) while allowing normal sharing.
#   apigen : everything else under /api/ — 30 req/sec sustained.
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=share:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=apigen:10m rate=30r/s;

# Return 429 (not the default 503) when a client exceeds its budget.
limit_req_status 429;

# Recover the real client IP from the upstream TLS proxy so rate limiting and
# logging key on the actual client, not the proxy's address. Without this every
# client would share one limit_req bucket (since $remote_addr would be the proxy).
#
# IMPORTANT: narrow set_real_ip_from to the upstream proxy's real address/CIDR.
# The RFC1918 ranges below are a working default for a private deployment where
# the ONLY ingress is the trusted upstream; do not use broad ranges if untrusted
# hosts can reach this instance directly (they could spoof X-Forwarded-For).
set_real_ip_from 10.0.0.0/8;
set_real_ip_from 172.16.0.0/16;
set_real_ip_from 192.168.0.0/16;
real_ip_header   X-Forwarded-For;
real_ip_recursive on;

server {
    # 8080 (not 80): the unprivileged nginx image runs as a non-root user that
    # cannot bind privileged ports. The host port mapping is unchanged.
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index login.html index.html;

    # Browser security headers (CSP, frame, nosniff, referrer, permissions).
    # Inherited by locations that don't define their own add_header (e.g. "/"
    # and the /api proxies); locations that set add_header must re-include it.
    include /etc/nginx/snippets/security-headers.conf;

    # Cap request bodies at the edge (defense in depth with the backend's
    # MaxBytesReader). 256k comfortably fits the largest team/loadout payload.
    client_max_body_size 256k;

    # HTML is always revalidated so updated asset version strings (e.g.
    # styles.css?v=N) are picked up immediately after a deploy. The security
    # snippet is re-included because this location's own add_header would
    # otherwise drop the server-level ones (nginx add_header inheritance rule).
    location ~* \.html$ {
        try_files $uri =404;
        add_header Cache-Control "no-cache";
        include /etc/nginx/snippets/security-headers.conf;
    }

    # Versioned JS/CSS may be cached; the ?v= query string busts stale copies.
    location ~* \.(?:js|css)$ {
        try_files $uri =404;
        add_header Cache-Control "no-cache";
        include /etc/nginx/snippets/security-headers.conf;
    }

    # Static assets / SPA fallback.
    location / {
        try_files $uri $uri/ =404;
    }

    # Auth endpoints: brute-force / credential-stuffing targets. The tight zone
    # plus a small burst absorbs normal retries while throttling attacks.
    location = /api/login {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /api/register {
        limit_req zone=auth burst=3 nodelay;
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /api/refresh {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Password-reset endpoints. Forgot-password can be abused to spam mail or
    # probe accounts; reset-password is a token-guessing target. Keep them on the
    # tight auth budget.
    location = /api/forgot-password {
        limit_req zone=auth burst=3 nodelay;
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /api/reset-password {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Team share-by-username: an authenticated username-existence oracle. A
    # regex location (matched before the /api/ prefix) applies a tight per-IP
    # limit so the endpoint can't be used for bulk enumeration. Matches any
    # method on /api/teams/{id}/share; only POST is implemented upstream.
    location ~ ^/api/teams/[0-9]+/share$ {
        limit_req zone=share burst=5 nodelay;
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Live-collaboration Server-Sent Events stream. This is a long-lived
    # streaming response, so disable proxy buffering and give it a long read
    # timeout (the backend sends a keepalive comment every 25s). Matched before
    # the generic /api/ prefix. The apigen rate limit is intentionally not
    # applied — each client holds a single persistent connection.
    location ~ ^/api/teams/[0-9]+/events$ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_buffering     off;
        proxy_cache         off;
        proxy_read_timeout  1h;
        chunked_transfer_encoding off;
    }

    # Proxy the remaining API requests to the backend service (named "backend"
    # on the docker-compose network), with a looser per-IP rate limit.
    location /api/ {
        limit_req zone=apigen burst=60 nodelay;
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
