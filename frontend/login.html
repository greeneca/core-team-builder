<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Core Team Builder</title>
  <link rel="stylesheet" href="css/styles.css?v=96" />
</head>
<body>
  <main class="center-screen">
    <div class="card card--narrow">
      <div class="text-center mt-4">
        <div class="brand">
          Core Team Builder
          <small>Elder Scrolls Online · Trial Roster</small>
        </div>
      </div>

      <div class="tabs mt-6">
        <button class="tab is-active" data-tab="login" type="button">Sign In</button>
        <button class="tab" data-tab="register" type="button">Register</button>
      </div>

      <div id="message" class="message is-hidden"></div>

      <!-- Login form -->
      <form id="login-form">
        <div class="form-group">
          <label for="login-username">Username</label>
          <input class="input" id="login-username" name="username" autocomplete="username" required />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input class="input" id="login-password" name="password" type="password" autocomplete="current-password" required />
        </div>
        <button class="btn btn--primary btn--block" type="submit">Sign In</button>
        <p class="text-center mt-4">
          <button id="forgot-link" class="link-btn" type="button">Forgot password?</button>
        </p>
      </form>

      <!-- Forgot-password form: request a reset link by email. -->
      <form id="forgot-form" class="is-hidden">
        <p class="text-muted">
          Enter your account email and we'll send a link to reset your password.
        </p>
        <div class="form-group">
          <label for="forgot-email">Email</label>
          <input class="input" id="forgot-email" name="email" type="email" autocomplete="email" required />
        </div>
        <button class="btn btn--primary btn--block" type="submit">Send reset link</button>
        <p class="text-center mt-4">
          <button id="forgot-back" class="link-btn" type="button">← Back to sign in</button>
        </p>
      </form>

      <!-- Register form -->
      <form id="register-form" class="is-hidden">
        <div class="form-group">
          <label for="register-username">Username</label>
          <input class="input" id="register-username" name="username" autocomplete="username" required />
        </div>
        <div class="form-group">
          <label for="register-email">Email</label>
          <input class="input" id="register-email" name="email" type="email" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label for="register-password">Password</label>
          <input class="input" id="register-password" name="password" type="password" autocomplete="new-password" minlength="8" required />
          <small class="text-muted">At least 8 characters.</small>
        </div>
        <button class="btn btn--primary btn--block" type="submit">Create Account</button>
      </form>

      <!-- Discord sign-in / sign-up. Hidden until the backend reports it's
           configured (registration-status.discord_enabled). A normal link, so
           the browser navigates to the backend which redirects to Discord. -->
      <div id="discord-auth" class="is-hidden">
        <div class="auth-sep">or</div>
        <a id="discord-login" class="btn btn--discord btn--block" href="/api/auth/discord/login">
          Continue with Discord
        </a>
      </div>
    </div>
  </main>

  <script src="js/api.js?v=96"></script>
  <script src="js/auth.js?v=96"></script>
</body>
</html>
