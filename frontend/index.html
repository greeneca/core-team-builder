<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Core Team Builder</title>
  <link rel="stylesheet" href="css/styles.css?v=21" />
</head>
<body>
  <div id="message" class="toast is-hidden" role="alert" aria-live="assertive"></div>

  <header class="topbar">
    <div class="brand">
      Core Team Builder
      <small>Elder Scrolls Online · Trial Roster</small>
    </div>
    <div class="topbar-actions">
      <span class="text-muted">Signed in as <strong id="username">…</strong></span>
      <button id="logout-btn" class="btn btn--ghost" type="button">Sign Out</button>
    </div>
  </header>

  <main class="container">
    <!-- Teams list view -->
    <section id="teams-view">
      <div class="section-head">
        <h1>Your Teams</h1>
        <button id="new-team-btn" class="btn btn--primary" type="button">+ New Team</button>
      </div>

      <form id="new-team-form" class="card is-hidden mt-4">
        <div class="form-group">
          <label for="new-team-name">Team name</label>
          <input class="input" id="new-team-name" maxlength="100" placeholder="e.g. Sunday Trial Core" required />
        </div>
        <div class="form-actions">
          <button class="btn btn--primary" type="submit">Create Team</button>
          <button class="btn btn--ghost" type="button" id="new-team-cancel">Cancel</button>
        </div>
      </form>

      <div id="teams-list" class="teams-grid mt-6"></div>
      <p id="teams-empty" class="text-muted is-hidden mt-6">
        You have no teams yet. Create one to start building your roster.
      </p>
    </section>

    <!-- Single team detail view -->
    <section id="team-detail-view" class="is-hidden">
      <button id="back-btn" class="btn btn--ghost" type="button">← Back to teams</button>

      <div class="card mt-4">
        <div class="section-head">
          <div>
            <input id="team-name-input" class="input team-name-input" maxlength="100" />
            <p class="text-muted" id="team-meta" style="margin: var(--space-2) 0 0;"></p>
          </div>
          <div class="form-actions">
            <span id="team-save-status" class="save-status" aria-live="polite"></span>
            <button id="delete-team-btn" class="btn btn--danger is-hidden" type="button">Delete Team</button>
          </div>
        </div>

        <div class="schedule mt-6">
          <h3 class="schedule-heading">Trial schedule</h3>
          <div class="form-group">
            <label>Days of the week</label>
            <div id="schedule-days" class="day-toggles"></div>
          </div>
          <div class="schedule-time-row">
            <div class="form-group schedule-time-group">
              <label for="schedule-time">Time</label>
              <input id="schedule-time" class="input" type="time" />
            </div>
            <div class="form-group schedule-tz-group">
              <label for="schedule-timezone">Timezone</label>
              <select id="schedule-timezone" class="input"></select>
            </div>
          </div>
        </div>
      </div>

      <!-- Encounters: select the current encounter (drives the per-player
           loadouts shown in the roster below) and add new ones. -->
      <div class="card mt-4">
        <div class="section-head">
          <h2 style="margin: 0;">Encounters</h2>
          <button id="add-encounter-btn" class="btn btn--ghost btn--sm is-hidden" type="button">+ Add Encounter</button>
        </div>
        <form id="add-encounter-form" class="add-encounter-form is-hidden mt-4">
          <div class="form-group">
            <label for="add-encounter-name">Encounter</label>
            <select id="add-encounter-name" class="input"></select>
          </div>
          <div class="form-actions">
            <button class="btn btn--primary btn--sm" type="submit">Add</button>
            <button class="btn btn--ghost btn--sm" type="button" id="add-encounter-cancel">Cancel</button>
          </div>
        </form>
        <div id="encounters-bar" class="encounters-bar mt-4"></div>

        <div id="encounter-controls" class="encounter-controls mt-4 is-hidden">
          <div class="encounter-title-row">
            <span class="text-muted">Loadouts for</span>
            <strong id="current-encounter-name">…</strong>
            <select id="encounter-rename" class="input input--sm is-hidden"></select>
          </div>
          <div class="form-actions">
            <span id="encounter-save-status" class="save-status" aria-live="polite"></span>
            <button id="encounter-delete-btn" class="btn btn--danger btn--sm is-hidden" type="button">Delete Encounter</button>
          </div>
        </div>
      </div>

      <!-- Roster -->
      <div class="card mt-4">
        <h2 style="margin-top: 0;">Roster <span class="text-muted">(12 players)</span></h2>
        <div id="roster" class="roster-grid"></div>
      </div>
    </section>

    <!-- Sharing view (own page) -->
    <section id="share-view" class="is-hidden">
      <button id="share-back-btn" class="btn btn--ghost" type="button">← Back to teams</button>

      <div class="card mt-4">
        <h1 id="share-team-name" style="margin-top: 0;">…</h1>
        <h2 style="margin-top: var(--space-5);">Shared with</h2>
        <div id="members-list" class="members-list"></div>

        <form id="share-form" class="share-form is-hidden mt-4">
          <input class="input" id="share-username" placeholder="username to share with" autocomplete="off" />
          <select class="input share-role-select" id="share-role">
            <option value="editor">Editor — can edit roster</option>
            <option value="viewer">Viewer — read-only</option>
          </select>
          <button class="btn btn--primary" type="submit">Share</button>
        </form>
        <p id="share-note" class="text-muted is-hidden mt-2">
          Only the team owner can share or remove access.
        </p>
      </div>
    </section>
  </main>

  <script src="js/api.js?v=21"></script>
  <script src="js/data.js?v=21"></script>
  <script src="js/components.js?v=21"></script>
  <script src="js/app.js?v=21"></script>
</body>
</html>
