# Core Team Builder — local/dev orchestration.
#
# Services:
#   db        PostgreSQL with schema auto-applied on first boot.
#   backend   Go API server.
#   seed      One-shot job: applies migrations + creates the test user.
#   frontend  nginx serving static files and proxying /api to backend.
#
# All services share a single user-defined bridge network (ctb-net) so they are
# isolated from other compose projects and reach each other by service name. Only
# the frontend publishes a host port; db and backend are reachable on ctb-net
# only.
#
# Copy .env.example to .env and adjust before running:  docker compose up --build

services:
  db:
    build: ./database
    image: ctb-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ctb-net
    restart: unless-stopped
    # Hardening. Postgres starts as root and steps down to the postgres user, so
    # it keeps only the capabilities required to initialize the data dir and
    # switch users (everything else dropped). no-new-privileges blocks setuid
    # escalation; resource limits bound DoS blast radius.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    mem_limit: 512m
    pids_limit: 200

  backend:
    build: ./backend
    image: ctb-backend
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable"
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL: ${JWT_TTL}
      REFRESH_TTL: ${REFRESH_TTL}
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ctb-net
    restart: unless-stopped
    # Hardening. The scratch image runs as a non-root UID and needs no caps; the
    # root filesystem is read-only (the static binary writes nothing), with a
    # small tmpfs for any transient /tmp use.
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 256m
    pids_limit: 100

  # One-shot seeder. Runs migrations and ensures the test user exists, then exits.
  seed:
    build: ./backend
    image: ctb-backend
    # Override the image ENTRYPOINT (/app/server) to run the seeder instead.
    entrypoint: ["/app/seed"]
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable"
      MIGRATIONS_DIR: "/migrations"
      SEED_USERNAME: ${SEED_USERNAME}
      SEED_EMAIL: ${SEED_EMAIL}
      SEED_PASSWORD: ${SEED_PASSWORD}
    volumes:
      - ./database/migrations:/migrations:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ctb-net
    restart: "no"
    # Same hardening as backend (same image, one-shot job).
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 256m
    pids_limit: 100

  frontend:
    build: ./frontend
    image: ctb-frontend
    # The container now listens on 8080 (unprivileged nginx); host port unchanged.
    # ports:
      #- "${FRONTEND_PORT}:8080"
    # Run nginx directly, bypassing the image's docker-entrypoint.d scripts which
    # rewrite config files at startup (incompatible with a read-only rootfs).
    entrypoint: ["nginx", "-g", "daemon off;"]
    depends_on:
      - backend
    networks:
      - ctb-net
    restart: unless-stopped
    # Hardening. Non-root unprivileged image, no caps (binds 8080, not 80),
    # read-only rootfs with tmpfs for nginx's runtime scratch (pid + temp files).
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 128m
    pids_limit: 100

networks:
  ctb-net:
    driver: bridge

volumes:
  db-data:
